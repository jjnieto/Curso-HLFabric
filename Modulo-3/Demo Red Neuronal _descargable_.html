  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"es\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>La red neuronal de la demo · cómo funciona por dentro<\u002Ftitle>\n<style>/* ── Presentación: Redes Neuronales — Adhara Design System ───────────── */\n@font-face {\n  font-family: \"Geist\";\n  src: url(\"f5312ade-2f45-4b89-ab3a-6d5a8cfad5bc\") format(\"woff2\");\n  font-weight: 100 900;\n  font-display: swap;\n}\n\n:root {\n  --background: #ffffff;\n  --card: #f8f8f8;\n  --muted: #f3f3f3;\n  --border: #e5e5e5;\n  --muted-foreground: #737373;\n  --foreground-dark: #171717;\n  --foreground: #0a0a0a;\n\n  --primary: #6022a2;\n  --primary-200: #bda3db;\n  --primary-foreground: #f9f7fe;\n\n  --destructive: #e7000b;\n  --destructive-muted: #ffe3df;\n  --destructive-foreground: #ac1a1b;\n  --warning: #da7f00;\n  --warning-muted: #fdebda;\n  --warning-foreground: #814300;\n  --success: #2f9f3d;\n  --success-muted: #dff1df;\n  --success-foreground: #1c5c23;\n\n  /* Layer / didactic palette (from chart tokens) */\n  --c-input: #6022a2;     /* purple  */\n  --c-input-soft: #ece3f7;\n  --c-h1: #007867;        /* teal    */\n  --c-h1-soft: #d8ece8;\n  --c-h2: #fe9a00;        /* orange  */\n  --c-h2-soft: #ffeccd;\n  --c-output: #d7427e;    /* pink    */\n  --c-output-soft: #fadbe7;\n\n  --font-sans: \"Geist\", system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n  --font-mono: \"Geist Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n}\n\n* , *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\n\ndeck-stage:not(:defined) { visibility: hidden; }\n\nsection {\n  background: var(--background);\n  color: var(--foreground);\n  font-family: var(--font-sans);\n  width: 1920px;\n  height: 1080px;\n  overflow: hidden;\n}\n\n/* ── Shared slide scaffolding ───────────────────────────────────────── */\n.slide {\n  position: absolute;\n  inset: 0;\n  padding: 88px 120px;\n  display: flex;\n  flex-direction: column;\n}\n\n.eyebrow {\n  display: inline-flex;\n  align-items: center;\n  gap: 12px;\n  font-size: 24px;\n  font-weight: 600;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--primary);\n}\n.eyebrow .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--primary); }\n\nh1.title {\n  font-size: 92px;\n  font-weight: 600;\n  letter-spacing: -.03em;\n  line-height: 1.02;\n  margin: 0;\n}\nh2.heading {\n  font-size: 60px;\n  font-weight: 600;\n  letter-spacing: -.025em;\n  line-height: 1.05;\n  margin: 0;\n}\n.lead {\n  font-size: 30px;\n  line-height: 1.5;\n  color: var(--muted-foreground);\n  max-width: 1100px;\n  text-wrap: pretty;\n}\n.lead strong { color: var(--foreground); font-weight: 600; }\n\n.slide-head { display: flex; flex-direction: column; gap: 18px; margin-bottom: 8px; }\n\n/* page number / footer */\n.foot {\n  position: absolute;\n  left: 120px; right: 120px; bottom: 52px;\n  display: flex; align-items: center; justify-content: space-between;\n  font-size: 24px; color: var(--muted-foreground);\n}\n.foot .mark { display: flex; align-items: center; gap: 10px; font-weight: 500; color: var(--foreground); }\n.foot .mark .sq { width: 16px; height: 16px; border-radius: 4px; background: var(--primary); }\n\n/* chips / legend */\n.legend { display: flex; gap: 26px; flex-wrap: wrap; }\n.legend .item { display: flex; align-items: center; gap: 11px; font-size: 24px; color: var(--foreground); }\n.legend .swatch { width: 22px; height: 22px; border-radius: 6px; }\n\n/* generic cards */\n.note {\n  background: var(--card);\n  border: 1px solid var(--border);\n  border-radius: 14px;\n  padding: 28px 32px;\n}\n.note .k { font-size: 24px; color: var(--muted-foreground); font-weight: 500; }\n.note .v { font-size: 34px; font-weight: 600; margin-top: 6px; }\n\n.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }\n\n/* primary button used for replay */\n.btn {\n  font-family: inherit; font-size: 24px; font-weight: 600; border: 0; cursor: pointer;\n  display: inline-flex; align-items: center; justify-content: center; gap: 12px;\n  height: 60px; padding: 0 28px; border-radius: 12px;\n  background: var(--primary); color: var(--primary-foreground);\n  transition: background .15s, opacity .15s, transform .08s;\n}\n.btn:hover { background: color-mix(in oklch, var(--primary) 90%, black); }\n.btn:active { transform: translateY(1px); }\n.btn.ghost { background: var(--muted); color: var(--foreground); }\n.btn.ghost:hover { background: var(--border); }\n.btn .ph { font-size: 26px; }\n.btn:disabled { opacity: .35; cursor: default; }\n\n/* ── SVG network ────────────────────────────────────────────────────── */\n.net-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }\nsvg.net { width: 100%; height: 100%; display: block; }\nsvg.net .edge { stroke: var(--border); stroke-width: 2; fill: none; transition: stroke .4s, stroke-width .4s, stroke-opacity .4s; }\nsvg.net .edge.hot { stroke-opacity: 1; }\nsvg.net .neuron-ring { fill: #ffffff; stroke-width: 4; transition: fill .4s, stroke .4s; }\nsvg.net .neuron-val {\n  font-family: var(--font-mono); font-weight: 600; text-anchor: middle; dominant-baseline: central;\n  fill: var(--foreground); opacity: 0; transition: opacity .35s;\n}\nsvg.net .neuron.lit .neuron-val { opacity: 1; }\nsvg.net .col-label { font-family: var(--font-sans); text-anchor: middle; }\nsvg.net .col-count { font-family: var(--font-sans); text-anchor: middle; fill: var(--muted-foreground); }\n\n.pulse { pointer-events: none; }\n<\u002Fstyle>\n<script src=\"223d6fb5-3d78-4664-9f37-195d13d77080\"><\u002Fscript>\n<style>\n  /* ── demo-deck specific layout ─────────────────────────────────── */\n  .cols { flex: 1; display: grid; gap: 56px; min-height: 0; }\n  .cols.side { grid-template-columns: 1.4fr 1fr; align-items: center; }\n  .cols.side-r { grid-template-columns: 1fr 1.4fr; align-items: center; }\n\n  .mlist { display: flex; flex-direction: column; gap: 20px; margin: 0; padding: 0; list-style: none; }\n  .mlist li { display: flex; gap: 16px; align-items: flex-start; font-size: 27px; line-height: 1.45; }\n  .mlist li i { color: var(--primary); font-size: 28px; margin-top: 3px; flex: none; }\n  .mlist li b { font-weight: 600; }\n\n  /* callout / big quote */\n  .callout { border-left: 5px solid var(--primary); background: var(--card); border-radius: 0 16px 16px 0; padding: 34px 42px; font-size: 38px; line-height: 1.35; font-weight: 500; }\n  .callout .sub { display: block; font-size: 26px; color: var(--muted-foreground); font-weight: 400; margin-top: 18px; }\n\n  /* digit input pipeline */\n  .digit-pipe { flex: 1; display: flex; align-items: center; justify-content: center; gap: 0; min-height: 0; }\n  .stage { display: flex; flex-direction: column; align-items: center; gap: 18px; }\n  .stage .cap { font-size: 24px; color: var(--muted-foreground); text-align: center; font-weight: 500; }\n  .stage .cap b { color: var(--foreground); }\n  #demoGrid { display: grid; grid-template-columns: repeat(20, 1fr); width: 380px; height: 380px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: #000; }\n  #demoGrid div { width: 100%; height: 100%; }\n  .arrow-step { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--muted-foreground); padding: 0 40px; }\n  .arrow-step i { font-size: 50px; }\n  .arrow-step span { font-size: 24px; }\n  .numcol { display: flex; flex-direction: column; gap: 8px; font-family: var(--font-mono); font-size: 27px; }\n  .numcol .row { display: flex; align-items: center; gap: 16px; }\n  .numcol .row .px { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); }\n  .numcol .row .val { font-variant-numeric: tabular-nums; }\n  .numcol .dots { font-size: 30px; color: var(--muted-foreground); padding-left: 46px; letter-spacing: 4px; }\n\n  /* pixel value legend */\n  .pxlegend { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 4px; }\n  .pxlegend .it { display: flex; align-items: center; gap: 10px; font-size: 24px; font-family: var(--font-mono); }\n  .pxlegend .sw { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); }\n\n  /* generic feature grid */\n  .grid4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 26px; }\n  .grid2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; }\n  .feat { display: flex; gap: 22px; align-items: flex-start; padding: 28px 32px; border: 1px solid var(--border); border-radius: 16px; background: var(--card); }\n  .feat .ico { flex: none; width: 60px; height: 60px; border-radius: 14px; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; }\n  .feat .ico i { font-size: 32px; }\n  .feat .h { font-size: 27px; font-weight: 600; margin-bottom: 6px; }\n  .feat p { font-size: 24px; color: var(--muted-foreground); line-height: 1.45; margin: 0; }\n\n  /* output activation bars */\n  .obars { display: flex; flex-direction: column; gap: 11px; width: 100%; max-width: 520px; }\n  .obar { display: grid; grid-template-columns: 44px 1fr 96px; align-items: center; gap: 16px; }\n  .obar .d { font-size: 30px; font-weight: 600; text-align: center; font-family: var(--font-mono); color: var(--muted-foreground); }\n  .obar .track { height: 26px; background: var(--muted); border-radius: 999px; overflow: hidden; }\n  .obar .fill { height: 100%; background: var(--c-output); border-radius: 999px; width: 0; transition: width .8s cubic-bezier(.4,0,.2,1); }\n  .obar .pct { font-size: 25px; text-align: right; font-variant-numeric: tabular-nums; color: var(--muted-foreground); font-family: var(--font-mono); }\n  .obar.win .d { color: var(--primary); }\n  .obar.win .fill { background: var(--primary); }\n  .obar.win .pct { color: var(--primary); font-weight: 600; }\n\n  /* weight / bias schematic */\n  .diagram { width: 100%; height: 100%; max-height: 600px; display: flex; align-items: center; justify-content: center; }\n  svg.diag { width: 100%; height: 100%; display: block; }\n\n  /* parameter counting */\n  .param-track { display: flex; flex-direction: column; gap: 22px; flex: 1; justify-content: center; }\n  .pseg { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 30px; padding: 28px 36px; border: 1px solid var(--border); border-radius: 16px; background: var(--card); opacity: .35; transition: opacity .4s, border-color .4s, background .4s; }\n  .pseg.on { opacity: 1; border-color: var(--primary); }\n  .pseg .label { font-size: 30px; }\n  .pseg .label .way { display: inline-flex; align-items: center; gap: 12px; font-weight: 600; }\n  .pseg .label .way .c { width: 18px; height: 18px; border-radius: 5px; }\n  .pseg .label .math { display: block; font-size: 22px; color: var(--muted-foreground); font-family: var(--font-mono); margin-top: 6px; }\n  .pseg .total { font-size: 48px; font-weight: 600; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }\n  .psum { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 30px; padding: 30px 40px; border-radius: 16px; background: var(--primary); color: #fff; opacity: .35; transition: opacity .4s; }\n  .psum.on { opacity: 1; }\n  .psum .label { font-size: 34px; font-weight: 600; }\n  .psum .total { font-size: 64px; font-weight: 700; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }\n\n  /* scale comparison */\n  .scale-list { display: flex; flex-direction: column; gap: 20px; flex: 1; justify-content: center; }\n  .srow { display: grid; grid-template-columns: 340px 1fr 280px; align-items: center; gap: 26px; }\n  .srow .name { font-size: 28px; font-weight: 500; }\n  .srow .name b { font-weight: 600; }\n  .srow.demo .name b { color: var(--primary); }\n  .srow .track { height: 40px; background: var(--muted); border-radius: 10px; overflow: hidden; }\n  .srow .fill { height: 100%; width: 0; border-radius: 10px; background: var(--primary-200); transition: width 1.1s cubic-bezier(.3,0,.2,1); }\n  .srow.demo .fill { background: var(--primary); }\n  .srow .count { font-size: 30px; font-family: var(--font-mono); font-variant-numeric: tabular-nums; text-align: right; color: var(--foreground); }\n  .srow .count .u { font-size: 22px; color: var(--muted-foreground); }\n  .scale-note { font-size: 22px; color: var(--muted-foreground); margin-top: 14px; }\n\n  /* big number hero */\n  .hero-num { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }\n  .hero-num .big { font-size: 200px; font-weight: 700; letter-spacing: -.04em; line-height: 1; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }\n  .hero-num .lbl { font-size: 34px; color: var(--muted-foreground); }\n  .hero-num .row2 { display: flex; gap: 56px; margin-top: 40px; }\n  .hero-num .row2 .b { text-align: center; }\n  .hero-num .row2 .b .n { font-size: 56px; font-weight: 600; font-family: var(--font-mono); }\n  .hero-num .row2 .b .s { font-size: 24px; color: var(--muted-foreground); margin-top: 4px; }\n\n  .center-x { align-items: center; text-align: center; }\n  .center-x .lead { margin-left: auto; margin-right: auto; }\n  .title-stage { justify-content: center; gap: 30px; }\n  .title-stage .meta { display: flex; gap: 32px; flex-wrap: wrap; margin-top: 18px; }\n  .title-stage .meta .m { display: flex; align-items: center; gap: 12px; font-size: 25px; color: var(--muted-foreground); }\n  .title-stage .meta .m i { font-size: 28px; color: var(--primary); }\n\n  .controls { display: flex; gap: 14px; align-items: center; margin-top: 8px; }\n  .net-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }\n\n  .tbl { width: 100%; border-collapse: collapse; font-size: 25px; }\n  .tbl th, .tbl td { text-align: left; padding: 16px 22px; border-bottom: 1px solid var(--border); }\n  .tbl th { font-weight: 600; color: var(--muted-foreground); font-size: 22px; }\n  .tbl td.num, .tbl th.num { text-align: right; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }\n  .tbl tr.tot td { font-weight: 700; font-size: 27px; border-top: 2px solid var(--foreground); border-bottom: none; }\n  .tbl .way { display: inline-flex; align-items: center; gap: 10px; }\n  .tbl .way .c { width: 14px; height: 14px; border-radius: 4px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- 01 · Portada -->\n  <section data-label=\"Portada\">\n    <div class=\"slide title-stage\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Demo · Reconocimiento de dígitos<\u002Fdiv>\n      <h1 class=\"title\">¿Qué hay dentro<br>de la red neuronal?<\u002Fh1>\n      <p class=\"lead\">Dibujas un número, la red adivina cuál es. Por dentro no hay reglas escritas a mano: hay <strong>números aprendidos<\u002Fstrong>. Vamos a abrirla, contar cuántos son y compararla con los modelos gigantes de hoy.<\u002Fp>\n      <div class=\"meta\">\n        <span class=\"m\"><i class=\"ph ph-pencil-simple\"><\u002Fi>Del dibujo a 400 números<\u002Fspan>\n        <span class=\"m\"><i class=\"ph ph-graph\"><\u002Fi>Pesos y biases<\u002Fspan>\n        <span class=\"m\"><i class=\"ph ph-scales\"><\u002Fi>11.000 vs. 175.000 millones<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>01<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 02 · ¿Qué hace la demo? -->\n  <section data-label=\"Qué hace\">\n    <div class=\"slide\">\n      <div class=\"slide-head\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>La demo<\u002Fdiv>\n        <h2 class=\"heading\">Dibujas un número y la red lo reconoce<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"cols side\">\n        <ul class=\"mlist\">\n          <li><i class=\"ph ph-pencil-simple-line\"><\u002Fi><span>El usuario <b>dibuja una cifra<\u002Fb> en una cuadrícula de píxeles.<\u002Fspan><\u002Fli>\n          <li><i class=\"ph ph-cpu\"><\u002Fi><span>La red la procesa y decide si es un <b>0, 1, 2, 3, 4, 5, 6, 7, 8 o 9<\u002Fb>.<\u002Fspan><\u002Fli>\n          <li><i class=\"ph ph-target\"><\u002Fi><span>Devuelve el dígito que considera <b>más probable<\u002Fb>.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div class=\"stage\">\n          <div id=\"demoGrid\"><\u002Fdiv>\n          <div class=\"cap\">Cuadrícula <b>20 × 20<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>02<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 · La idea clave -->\n  <section data-label=\"Idea clave\">\n    <div class=\"slide center-x\" style=\"justify-content:center;align-items:center;\">\n      <div class=\"eyebrow\" style=\"justify-content:center;\"><span class=\"dot\"><\u002Fspan>La idea más importante<\u002Fdiv>\n      <div class=\"callout\" style=\"max-width:1300px;margin-top:36px;text-align:left;\">\n        Una red neuronal <strong>no guarda reglas<\u002Fstrong> escritas por una persona.<br>Guarda <strong>muchos números aprendidos<\u002Fstrong> durante el entrenamiento.\n        <span class=\"sub\">A esos números aprendidos los llamamos <b style=\"color:var(--primary)\">parámetros<\u002Fb>.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>03<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 04 · Visión general de la red -->\n  <section data-label=\"La red\">\n    <div class=\"slide\">\n      <div class=\"slide-head\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Visión general<\u002Fdiv>\n        <h2 class=\"heading\">La estructura de la red<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"net-wrap\"><svg id=\"demoNet\"><\u002Fsvg><\u002Fdiv>\n      <div class=\"legend\" style=\"justify-content:center;gap:44px;\">\n        <div class=\"item\"><span class=\"swatch\" style=\"background:var(--c-input)\"><\u002Fspan>Entrada · 400 valores<\u002Fdiv>\n        <div class=\"item\"><span class=\"swatch\" style=\"background:var(--c-h1)\"><\u002Fspan>Oculta 1 · 25 neuronas<\u002Fdiv>\n        <div class=\"item\"><span class=\"swatch\" style=\"background:var(--c-h2)\"><\u002Fspan>Oculta 2 · 25 neuronas<\u002Fdiv>\n        <div class=\"item\"><span class=\"swatch\" style=\"background:var(--c-output)\"><\u002Fspan>Salida · 10 dígitos<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>04<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 · Capa de entrada (animada) -->\n  <section data-label=\"Entrada\">\n    <div class=\"slide\">\n      <div class=\"slide-head\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Capa de entrada<\u002Fdiv>\n        <h2 class=\"heading\">De un dibujo a 400 números<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"digit-pipe\">\n        <div class=\"stage\">\n          <div id=\"inGrid\" style=\"display:grid;grid-template-columns:repeat(20,1fr);width:340px;height:340px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#000;\"><\u002Fdiv>\n          <div class=\"cap\">20 × 20 = <b>400 píxeles<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"arrow-step\"><i class=\"ph ph-arrow-right\"><\u002Fi><span>cada píxel → un número<\u002Fspan><\u002Fdiv>\n        <div class=\"stage\">\n          <div class=\"numcol\" id=\"numCol\"><\u002Fdiv>\n          <div class=\"cap\"><b>400 valores<\u002Fb> entre 0.0 y 1.0<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:60px;\"><\u002Fdiv>\n        <div class=\"stage\" style=\"align-items:flex-start;\">\n          <div class=\"pxlegend\" style=\"flex-direction:column;\">\n            <div class=\"it\"><span class=\"sw\" style=\"background:#000\"><\u002Fspan>1.0 · negro<\u002Fdiv>\n            <div class=\"it\"><span class=\"sw\" style=\"background:#404040\"><\u002Fspan>0.75 · gris oscuro<\u002Fdiv>\n            <div class=\"it\"><span class=\"sw\" style=\"background:#bfbfbf\"><\u002Fspan>0.25 · gris claro<\u002Fdiv>\n            <div class=\"it\"><span class=\"sw\" style=\"background:#fff\"><\u002Fspan>0.0 · blanco<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cap\" style=\"text-align:left;max-width:300px;\">La capa de entrada <b>no aprende<\u002Fb> ni decide: solo sostiene los datos.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>05<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 06 · Oculta 1 -->\n  <section data-label=\"Oculta 1\">\n    <div class=\"slide\">\n      <div class=\"slide-head\">\n        <div class=\"eyebrow\"><span class=\"dot\" style=\"background:var(--c-h1)\"><\u002Fspan><span style=\"color:var(--c-h1)\">Capa oculta 1 · 25 neuronas<\u002Fspan><\u002Fdiv>\n        <h2 class=\"heading\">Detecta patrones simples<\u002Fh2>\n        <p class=\"lead\">Cada una de las 25 neuronas mira los <strong>400 píxeles<\u002Fstrong> a la vez y aprende a encenderse ante un trazo básico. Nadie se lo programa: lo descubre ajustando sus pesos.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"grid4\" style=\"flex:1;align-content:center;\">\n        <div class=\"feat\"><div class=\"ico\" style=\"background:var(--c-h1)\"><i class=\"ph ph-line-vertical\"><\u002Fi><\u002Fdiv><div><div class=\"h\">Líneas verticales<\u002Fdiv><p>Un trazo recto de arriba abajo.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"feat\"><div class=\"ico\" style=\"background:var(--c-h1)\"><i class=\"ph ph-minus\"><\u002Fi><\u002Fdiv><div><div class=\"h\">Líneas horizontales<\u002Fdiv><p>Un trazo recto de lado a lado.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"feat\"><div class=\"ico\" style=\"background:var(--c-h1)\"><i class=\"ph ph-bezier-curve\"><\u002Fi><\u002Fdiv><div><div class=\"h\">Curvas y esquinas<\u002Fdiv><p>Cambios de dirección del trazo.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"feat\"><div class=\"ico\" style=\"background:var(--c-h1)\"><i class=\"ph ph-circle-half\"><\u002Fi><\u002Fdiv><div><div class=\"h\">Zonas oscuras<\u002Fdiv><p>Tinta concentrada en una región.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>06<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 07 · Oculta 2 -->\n  <section data-label=\"Oculta 2\">\n    <div class=\"slide\">\n      <div class=\"slide-head\">\n        <div class=\"eyebrow\"><span class=\"dot\" style=\"background:var(--c-h2)\"><\u002Fspan><span style=\"color:var(--c-h2)\">Capa oculta 2 · 25 neuronas<\u002Fspan><\u002Fdiv>\n        <h2 class=\"heading\">Combina patrones en formas<\u002Fh2>\n        <p class=\"lead\">Ya no mira los píxeles: mira <strong>lo que detectó la capa anterior<\u002Fstrong> y lo combina en formas parecidas a cifras.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"net-wrap\" style=\"margin-top:32px;\"><svg id=\"combineNet\" style=\"max-height:560px;\"><\u002Fsvg><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>07<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 08 · Capa de salida -->\n  <section data-label=\"Salida\">\n    <div class=\"slide\">\n      <div class=\"slide-head\">\n        <div class=\"eyebrow\"><span class=\"dot\" style=\"background:var(--c-output)\"><\u002Fspan><span style=\"color:var(--c-output)\">Capa de salida · 10 neuronas<\u002Fspan><\u002Fdiv>\n        <h2 class=\"heading\">Una neurona por cada dígito<\u002Fh2>\n        <p class=\"lead\">Cada neurona da una <strong>activación<\u002Fstrong>: cuánto cree la red que el dibujo es ese número. Gana la más alta.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"net-wrap\">\n        <div class=\"obars\" id=\"outBars\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>08<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 09 · Conexiones = pesos -->\n  <section data-label=\"Pesos\">\n    <div class=\"slide\">\n      <div class=\"slide-head\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Las conexiones<\u002Fdiv>\n        <h2 class=\"heading\">Cada conexión tiene un peso<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"cols side-r\">\n        <div class=\"diagram\"><svg id=\"weightDiag\"><\u002Fsvg><\u002Fdiv>\n        <div>\n          <p class=\"lead\" style=\"font-size:27px;\">Lo importante de una conexión no es la línea: es el <strong>número<\u002Fstrong> que lleva, su <strong>peso<\u002Fstrong>. Indica cuánto influye una neurona sobre la siguiente.<\u002Fp>\n          <ul class=\"mlist\" style=\"margin-top:28px;\">\n            <li><i class=\"ph ph-plus-circle\" style=\"color:var(--success)\"><\u002Fi><span>Peso <b>positivo<\u002Fb>: ayuda a activar la siguiente neurona.<\u002Fspan><\u002Fli>\n            <li><i class=\"ph ph-minus-circle\" style=\"color:var(--destructive)\"><\u002Fi><span>Peso <b>negativo<\u002Fb>: la frena o inhibe.<\u002Fspan><\u002Fli>\n            <li><i class=\"ph ph-circle\" style=\"color:var(--muted-foreground)\"><\u002Fi><span>Cercano a <b>0<\u002Fb>: apenas influye.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>09<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 10 · Bias -->\n  <section data-label=\"Bias\">\n    <div class=\"slide\">\n      <div class=\"slide-head\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>El sesgo<\u002Fdiv>\n        <h2 class=\"heading\">Y cada neurona tiene un bias<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"cols side\">\n        <div>\n          <p class=\"lead\" style=\"font-size:27px;\">Además de los pesos, cada neurona tiene un número propio: el <strong>bias<\u002Fstrong> (o sesgo). Ajusta con qué facilidad se enciende esa neurona.<\u002Fp>\n          <div class=\"callout\" style=\"margin-top:30px;font-size:30px;\">\n            Los <b style=\"color:var(--c-h1)\">pesos<\u002Fb> dicen cuánto importan las entradas.<br>El <b style=\"color:var(--c-h2)\">bias<\u002Fb> dice qué tendencia inicial tiene la neurona a activarse.\n          <\u002Fdiv>\n          <div class=\"note\" style=\"margin-top:28px;\">\n            <div class=\"k\">Por eso, al contar los parámetros de una red contamos<\u002Fdiv>\n            <div class=\"v mono\">parámetros = pesos + biases<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"diagram\"><svg id=\"biasDiag\"><\u002Fsvg><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>10<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 11 · La regla para contar -->\n  <section data-label=\"La regla\">\n    <div class=\"slide center-x\" style=\"justify-content:center;\">\n      <div class=\"eyebrow\" style=\"justify-content:center;\"><span class=\"dot\"><\u002Fspan>Cómo se mide el tamaño del modelo<\u002Fdiv>\n      <h2 class=\"heading\" style=\"margin-top:20px;\">La regla para contar parámetros<\u002Fh2>\n      <div class=\"callout\" style=\"max-width:1280px;margin:44px auto 0;text-align:left;\">\n        Entre dos capas:<br>\n        <span class=\"mono\" style=\"color:var(--c-h1)\">neuronas antes<\u002Fspan> × <span class=\"mono\" style=\"color:var(--c-output)\">neuronas después<\u002Fspan> <span style=\"color:var(--muted-foreground)\">(pesos)<\u002Fspan><br>\n        <span style=\"font-size:30px;\">+ <\u002Fspan><span class=\"mono\" style=\"color:var(--c-h2)\">biases de la capa siguiente<\u002Fspan>\n        <span class=\"sub\">En resumen: <b>parámetros = conexiones + biases<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>11<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 12 · Conteo animado -->\n  <section data-label=\"Conteo\">\n    <div class=\"slide\">\n      <div class=\"slide-head\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Cálculo tramo a tramo<\u002Fdiv>\n        <h2 class=\"heading\">Contemos los parámetros<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"cols side\" style=\"grid-template-columns:1.5fr 1fr;\">\n        <div class=\"param-track\">\n          <div class=\"pseg\" data-seg=\"0\">\n            <div class=\"label\">\n              <span class=\"way\"><span class=\"c\" style=\"background:var(--c-input)\"><\u002Fspan>Entrada<i class=\"ph ph-arrow-right\" style=\"font-size:22px;color:var(--muted-foreground)\"><\u002Fi><span class=\"c\" style=\"background:var(--c-h1)\"><\u002Fspan>Oculta 1<\u002Fspan>\n              <span class=\"math\">400 × 25 = 10.000 pesos + 25 biases<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"total\" data-target=\"10025\">0<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"pseg\" data-seg=\"1\">\n            <div class=\"label\">\n              <span class=\"way\"><span class=\"c\" style=\"background:var(--c-h1)\"><\u002Fspan>Oculta 1<i class=\"ph ph-arrow-right\" style=\"font-size:22px;color:var(--muted-foreground)\"><\u002Fi><span class=\"c\" style=\"background:var(--c-h2)\"><\u002Fspan>Oculta 2<\u002Fspan>\n              <span class=\"math\">25 × 25 = 625 pesos + 25 biases<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"total\" data-target=\"650\">0<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"pseg\" data-seg=\"2\">\n            <div class=\"label\">\n              <span class=\"way\"><span class=\"c\" style=\"background:var(--c-h2)\"><\u002Fspan>Oculta 2<i class=\"ph ph-arrow-right\" style=\"font-size:22px;color:var(--muted-foreground)\"><\u002Fi><span class=\"c\" style=\"background:var(--c-output)\"><\u002Fspan>Salida<\u002Fspan>\n              <span class=\"math\">25 × 10 = 250 pesos + 10 biases<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"total\" data-target=\"260\">0<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"psum\" data-seg=\"3\">\n            <div class=\"label\">Total del modelo<\u002Fdiv>\n            <div class=\"total\" data-target=\"10935\">0<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <p class=\"lead\" style=\"font-size:27px;\">Sumamos los parámetros de cada tramo de la red. La capa de entrada manda: 400 píxeles hacia 25 neuronas son <strong>10.000 pesos<\u002Fstrong> de golpe.<\u002Fp>\n          <div class=\"controls\" style=\"margin-top:26px;\"><button class=\"btn\" id=\"replayCount\"><i class=\"ph ph-play\"><\u002Fi>Contar de nuevo<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>12<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 13 · Total + memoria -->\n  <section data-label=\"Total\">\n    <div class=\"slide center-x\" style=\"justify-content:center;\">\n      <div class=\"eyebrow\" style=\"justify-content:center;\"><span class=\"dot\"><\u002Fspan>El tamaño de esta red<\u002Fdiv>\n      <div class=\"hero-num\">\n        <div class=\"big\" style=\"color:var(--primary)\">10.935<\u002Fdiv>\n        <div class=\"lbl\">parámetros — unos <strong>11.000 números aprendidos<\u002Fstrong><\u002Fdiv>\n        <div class=\"row2\">\n          <div class=\"b\"><div class=\"n\">10.875<\u002Fdiv><div class=\"s\">pesos<\u002Fdiv><\u002Fdiv>\n          <div class=\"b\"><div class=\"n\">60<\u002Fdiv><div class=\"s\">biases<\u002Fdiv><\u002Fdiv>\n          <div class=\"b\"><div class=\"n\" style=\"color:var(--c-h1)\">≈ 43 KB<\u002Fdiv><div class=\"s\">en memoria (4 bytes c/u)<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"lead center-x\" style=\"margin-top:10px;\">Es un modelo <strong>diminuto<\u002Fstrong>: ocupa menos que muchas fotos pequeñas.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>13<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 14 · Comparación de escala (animada) -->\n  <section data-label=\"Escala\">\n    <div class=\"slide\">\n      <div class=\"slide-head\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>La diferencia es de escala<\u002Fdiv>\n        <h2 class=\"heading\">11.000 frente a los modelos de hoy<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"scale-list\" id=\"scaleList\">\n        <div class=\"srow demo\" data-val=\"10935\"><div class=\"name\"><b>Esta demo<\u002Fb><\u002Fdiv><div class=\"track\"><div class=\"fill\"><\u002Fdiv><\u002Fdiv><div class=\"count\"><span class=\"n\">0<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"srow\" data-val=\"60000\"><div class=\"name\">LeNet-5 <span style=\"color:var(--muted-foreground)\">· red clásica<\u002Fspan><\u002Fdiv><div class=\"track\"><div class=\"fill\"><\u002Fdiv><\u002Fdiv><div class=\"count\"><span class=\"n\">0<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"srow\" data-val=\"60000000\"><div class=\"name\">AlexNet <span style=\"color:var(--muted-foreground)\">· visión<\u002Fspan><\u002Fdiv><div class=\"track\"><div class=\"fill\"><\u002Fdiv><\u002Fdiv><div class=\"count\"><span class=\"n\">0<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"srow\" data-val=\"110000000\"><div class=\"name\">BERT Base <span style=\"color:var(--muted-foreground)\">· lenguaje<\u002Fspan><\u002Fdiv><div class=\"track\"><div class=\"fill\"><\u002Fdiv><\u002Fdiv><div class=\"count\"><span class=\"n\">0<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"srow\" data-val=\"1500000000\"><div class=\"name\">GPT-2<\u002Fdiv><div class=\"track\"><div class=\"fill\"><\u002Fdiv><\u002Fdiv><div class=\"count\"><span class=\"n\">0<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"srow\" data-val=\"175000000000\"><div class=\"name\">GPT-3<\u002Fdiv><div class=\"track\"><div class=\"fill\"><\u002Fdiv><\u002Fdiv><div class=\"count\"><span class=\"n\">0<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"scale-note\">Las barras usan escala logarítmica: cada paso a la derecha multiplica, no suma. Si fuera lineal, la demo sería invisible.<\u002Fdiv>\n      <div class=\"controls\" style=\"position:absolute;right:120px;bottom:120px;\"><button class=\"btn ghost\" id=\"replayScale\"><i class=\"ph ph-play\"><\u002Fi>Reproducir<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>14<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15 · Idea final -->\n  <section data-label=\"Resumen\">\n    <div class=\"slide\">\n      <div class=\"slide-head\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>La idea final<\u002Fdiv>\n        <h2 class=\"heading\">Una red es una colección de números ajustables<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"grid2\" style=\"flex:1;align-content:center;\">\n        <div class=\"feat\"><div class=\"ico\"><i class=\"ph ph-numpad\"><\u002Fi><\u002Fdiv><div><div class=\"h\">Son números, no reglas<\u002Fdiv><p>Entrenar significa encontrar valores útiles para esos parámetros.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"feat\"><div class=\"ico\"><i class=\"ph ph-stack\"><\u002Fi><\u002Fdiv><div><div class=\"h\">Las capas construyen sentido<\u002Fdiv><p>Píxeles → trazos → formas → dígito. Cada capa combina lo anterior.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"feat\"><div class=\"ico\"><i class=\"ph ph-ruler\"><\u002Fi><\u002Fdiv><div><div class=\"h\">Esta demo: ≈ 11.000<\u002Fdiv><p>Cabe en 43 KB y reconoce cifras escritas a mano.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"feat\"><div class=\"ico\"><i class=\"ph ph-trend-up\"><\u002Fi><\u002Fdiv><div><div class=\"h\">Los gigantes: miles de millones<\u002Fdiv><p>Misma idea, muchísima más escala y capacidad.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"mark\"><span class=\"sq\"><\u002Fspan>Red neuronal · Demo de dígitos<\u002Fspan><span>15<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<script src=\"2438624b-57f8-4a90-a4cb-726e6428974c\"><\u002Fscript>\n<script src=\"b06e8f03-f646-4a24-bae6-d5a601d1af7d\"><\u002Fscript>\n<script src=\"d3ee0d5c-67a9-451e-af26-66e131efbbcb\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
