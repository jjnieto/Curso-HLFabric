version: '3.7'

volumes:
  orderer.distributech.com:
  peer0.fabricante.distributech.com:
  peer0.mayorista.distributech.com:
  peer0.minorista.distributech.com:

networks:
  distributech-net:
    external: true
    name: distributech-net

services:
  # ── Orderer ──────────────────────────────────────────────────
  orderer.distributech.com:
    container_name: orderer.distributech.com
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
    command: orderer
    volumes:
      - ../organizations/ordererOrganizations/distributech.com/orderers/orderer.distributech.com/msp:/var/hyperledger/orderer/msp
      - ../organizations/ordererOrganizations/distributech.com/orderers/orderer.distributech.com/tls:/var/hyperledger/orderer/tls
      - orderer.distributech.com:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
      - 7053:7053
    networks:
      - distributech-net

  # ── Fabricante ───────────────────────────────────────────────
  couchdb.fabricante:
    container_name: couchdb.fabricante
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 5984:5984
    networks:
      - distributech-net

  peer0.fabricante.distributech.com:
    container_name: peer0.fabricante.distributech.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.fabricante.distributech.com
      - CORE_PEER_ADDRESS=peer0.fabricante.distributech.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.fabricante.distributech.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.fabricante.distributech.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.fabricante.distributech.com:7051
      - CORE_PEER_LOCALMSPID=FabricanteMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=distributech-net
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.fabricante:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/peerOrganizations/fabricante.distributech.com/peers/peer0.fabricante.distributech.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/fabricante.distributech.com/peers/peer0.fabricante.distributech.com/tls:/etc/hyperledger/fabric/tls
      - peer0.fabricante.distributech.com:/var/hyperledger/production
    ports:
      - 7051:7051
    depends_on:
      - couchdb.fabricante
    networks:
      - distributech-net

  # ── Mayorista ────────────────────────────────────────────────
  couchdb.mayorista:
    container_name: couchdb.mayorista
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 7984:5984
    networks:
      - distributech-net

  peer0.mayorista.distributech.com:
    container_name: peer0.mayorista.distributech.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.mayorista.distributech.com
      - CORE_PEER_ADDRESS=peer0.mayorista.distributech.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.mayorista.distributech.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.mayorista.distributech.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.mayorista.distributech.com:9051
      - CORE_PEER_LOCALMSPID=MayoristaMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=distributech-net
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.mayorista:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/peerOrganizations/mayorista.distributech.com/peers/peer0.mayorista.distributech.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/mayorista.distributech.com/peers/peer0.mayorista.distributech.com/tls:/etc/hyperledger/fabric/tls
      - peer0.mayorista.distributech.com:/var/hyperledger/production
    ports:
      - 9051:9051
    depends_on:
      - couchdb.mayorista
    networks:
      - distributech-net

  # ── Minorista ────────────────────────────────────────────────
  couchdb.minorista:
    container_name: couchdb.minorista
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 9984:5984
    networks:
      - distributech-net

  peer0.minorista.distributech.com:
    container_name: peer0.minorista.distributech.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.minorista.distributech.com
      - CORE_PEER_ADDRESS=peer0.minorista.distributech.com:11051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
      - CORE_PEER_CHAINCODEADDRESS=peer0.minorista.distributech.com:11052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.minorista.distributech.com:11051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.minorista.distributech.com:11051
      - CORE_PEER_LOCALMSPID=MinoristaMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=distributech-net
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.minorista:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/peerOrganizations/minorista.distributech.com/peers/peer0.minorista.distributech.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/minorista.distributech.com/peers/peer0.minorista.distributech.com/tls:/etc/hyperledger/fabric/tls
      - peer0.minorista.distributech.com:/var/hyperledger/production
    ports:
      - 11051:11051
    depends_on:
      - couchdb.minorista
    networks:
      - distributech-net
